name = "decideact-api"
main = "src/index.ts"
compatibility_date = "2025-09-01"

# KV namespace for storing form submissions.
# Create with:  wrangler kv namespace create "SUBMISSIONS"
#               wrangler kv namespace create "SUBMISSIONS" --preview
# Then paste the returned ids below.
[[kv_namespaces]]
binding = "SUBMISSIONS"
id = "654edde391c6498ea4818f6051f2057c"
preview_id = "44dcd3c7ba084b8fa8abbe6bdca63744"

[vars]
ALLOWED_ORIGIN = "https://statecraft.systems"

# Secrets (set with: wrangler secret put ADMIN_TOKEN):
# ADMIN_TOKEN      — bearer token for GET /submissions
# SLACK_WEBHOOK    — optional; if set, new submissions ping this webhook
# NOTIFY_EMAIL     — optional; used in slack message body
