name = "yvs-api"
main = "src/index.ts"
compatibility_date = "2025-09-01"

# KV namespace for storing form submissions.
# Create with:  wrangler kv namespace create "SUBMISSIONS"
#               wrangler kv namespace create "SUBMISSIONS" --preview
# Then paste the returned ids below.
[[kv_namespaces]]
binding = "SUBMISSIONS"
id = "d35b7bdf278047cd9cfbc0365d879d20"
preview_id = "71c09840ce034cb08b5c6ae579115e41"

[vars]
ALLOWED_ORIGIN = "https://statecraft.systems"
NOTIFY_TO = "orders@yakimavalleysupply.com"
NOTIFY_FROM = "Yakima Valley Supply <no-reply@statecraft.systems>"

# Secrets (set with: wrangler secret put <NAME>):
# RESEND_API_KEY   — Resend key for sending the notification email
# ADMIN_TOKEN      — optional; bearer token for GET /submissions
# SLACK_WEBHOOK    — optional; if set, new submissions ping this webhook
